version: "3.9"

# SwarmPay — VM deployment
# Usage:
#   1. Copy backend/.env.example → backend/.env and fill in your keys
#   2. docker compose up -d
#   3. Open http://<your-vm-ip>:3000

services:

  pocketbase:
    build: ./pocketbase
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      # Override PocketBase URL to use internal Docker network name
      POCKETBASE_URL: http://pocketbase:8090
      BACKEND_URL: http://backend:8000
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  pb_data:
